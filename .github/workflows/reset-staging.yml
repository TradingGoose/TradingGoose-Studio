name: Reset staging branch

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  reset-staging:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force-push main to staging
        run: git push origin origin/main:refs/heads/staging --force
