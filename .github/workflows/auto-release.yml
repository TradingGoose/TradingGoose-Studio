name: Auto release

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  release:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'staging'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date -u +'%Y.%m.%d')"

          # Append suffix if tag already exists (e.g. v2026.04.03.1)
          SUFFIX=0
          while gh release view "$TAG" > /dev/null 2>&1; do
            SUFFIX=$((SUFFIX + 1))
            TAG="v$(date -u +'%Y.%m.%d').$SUFFIX"
          done

          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --latest
