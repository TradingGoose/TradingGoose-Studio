name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date -u +'%Y.%m.%d')"

          # Append suffix if tag already exists (e.g. v2026.04.03.1)
          SUFFIX=0
          while gh release view "$TAG" > /dev/null 2>&1; do
            SUFFIX=$((SUFFIX + 1))
            TAG="v$(date -u +'%Y.%m.%d').$SUFFIX"
          done

          # Get the previous release date to filter PRs
          PREV_DATE=$(gh release list --limit 1 --json createdAt --jq '.[0].createdAt' 2>/dev/null || echo "")

          # Build release notes from PRs merged into staging since last release
          if [ -n "$PREV_DATE" ]; then
            NOTES=$(gh pr list --base staging --state merged --json number,title,author \
              --jq '.[] | "- \(.title) (#\(.number)) @\(.author.login)"' \
              --search "merged:>=$PREV_DATE")
          else
            NOTES=$(gh pr list --base staging --state merged --json number,title,author \
              --jq '.[] | "- \(.title) (#\(.number)) @\(.author.login)"')
          fi

          if [ -z "$NOTES" ]; then
            NOTES="No changes since last release."
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --target staging \
            --notes "$NOTES" \
            --latest
