name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date -u +'%Y.%m.%d')"

          # Append suffix if tag already exists (e.g. v2026.04.03.1)
          SUFFIX=0
          while gh release view "$TAG" > /dev/null 2>&1; do
            SUFFIX=$((SUFFIX + 1))
            TAG="v$(date -u +'%Y.%m.%d').$SUFFIX"
          done

          # Get the previous release tag
          PREV_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")

          # Build release notes from commits since previous release
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s (%h)" --no-merges)
          fi

          if [ -z "$NOTES" ]; then
            NOTES="No changes since last release."
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES" \
            --latest
