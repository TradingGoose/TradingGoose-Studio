name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date -u +'%Y.%m.%d')"

          # Append suffix if tag already exists (e.g. v2026.04.03.1)
          SUFFIX=0
          while gh release view "$TAG" > /dev/null 2>&1; do
            SUFFIX=$((SUFFIX + 1))
            TAG="v$(date -u +'%Y.%m.%d').$SUFFIX"
          done

          # Get the previous release date to filter PRs
          PREV_DATE=$(gh release list --limit 1 --json createdAt --jq '.[0].createdAt' 2>/dev/null || echo "")

          # Build release notes from individual commits within each PR merged into staging
          NOTES=""
          if [ -n "$PREV_DATE" ]; then
            PR_LIST=$(gh pr list --base staging --state merged --json number,title,mergedAt \
              --jq "[.[] | select(.mergedAt >= \"$PREV_DATE\")] | .[] | \"\(.number)\t\(.title)\"")
          else
            PR_LIST=$(gh pr list --base staging --state merged --json number,title \
              --jq '.[] | "\(.number)\t\(.title)"')
          fi

          while IFS=$'\t' read -r PR_NUM PR_TITLE; do
            [ -z "$PR_NUM" ] && continue
            NOTES="${NOTES}### ${PR_TITLE} (#${PR_NUM})"$'\n'
            COMMITS=$(gh pr view "$PR_NUM" --json commits \
              --jq '.commits[] | "- \(.messageHeadline) (\(.oid[:7]))"')
            NOTES="${NOTES}${COMMITS}"$'\n\n'
          done <<< "$PR_LIST"

          if [ -z "$NOTES" ]; then
            NOTES="No changes since last release."
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --target staging \
            --notes "$NOTES" \
            --latest
